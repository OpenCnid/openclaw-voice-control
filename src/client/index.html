    </div>

    <script>
    (() => {
        // ── DOM ──
        const $ = id => document.getElementById(id);
        const chat    = $('chat');
        const empty   = $('empty');
        const toast   = $('toast');
        const dot     = $('dot');
        const connLbl = $('connLabel');
        const orbBtn  = $('orbBtn');
        const voiceBar = $('voiceBar');
        const waveWrap = $('waveWrap');
        const canvas   = $('waveCanvas');
        const ctx      = canvas.getContext('2d');
        const stateLbl = $('stateLabel');
        const micLevelWrap = $('micLevelWrap');
        const micLevelBar  = $('micLevelBar');
        const micLevelLabel = $('micLevelLabel');
        const liveTranscript = $('liveTranscript');
        const jumpBottom = $('jumpBottom');

        // ── Settings (persisted) ──
        const settings = {
            volume: parseInt(localStorage.getItem('vc_volume') || '80'),
            speed: parseInt(localStorage.getItem('vc_speed') || '100'),
            silence: parseInt(localStorage.getItem('vc_silence') || '2000'),
        };
        let gainNode = null; // for volume control on playback

        // ── State ──
        let ws = null;
        let audioCtx = null, audioSrc = null, workletNode = null, mic = null;
        let hpFilter = null; // BiquadFilterNode high-pass (removes rumble)
        let workletReady = false; // AudioWorklet module loaded
        let recording = false;
        // Default to continuous (always-on) for fresh installs
        const contPref = localStorage.getItem('voiceControlContinuous');
        let continuous = contPref === null ? true : contPref === 'true';
        let speechDetected = false, recStart = 0;
        let uiState = 'idle'; // idle | listening | processing | speaking | cont-idle | paused
        let paused = false; // continuous mode pause state
        let SILENCE_MS = settings.silence;
        const MIN_DUR = 600, MIN_LEN = 2;
        const RELISTEN_DELAY = 250; // unified fast re-listen delay for continuous mode

        // Screen Wake Lock — keep screen on during active listening/speaking
        let wakeLock = null;
        async function requestWakeLock() {
            if (wakeLock || !('wakeLock' in navigator)) return;
            try { wakeLock = await navigator.wakeLock.request('screen'); wakeLock.addEventListener('release', () => { wakeLock = null; }); }
            catch(e) { /* user denied or not supported */ }
        }
        function releaseWakeLock() {
            if (wakeLock) { wakeLock.release().catch(() => {}); wakeLock = null; }
        }

        // Reconnection state
        let reconnectAttempts = 0;
        let reconnectTimer = null;
        const RECONNECT_BASE_MS = 1000;
        const RECONNECT_MAX_MS = 30000;

        // Streaming
        let audioQ = [], playing = false, curMsgEl = null, streamTxt = '';
        let playCtx = null, nextTime = 0;

        // Waveform data — smoothed at 60fps, decoupled from audio callback
        let waveRaw = new Float32Array(128);   // latest from mic
        let waveSmooth = new Float32Array(48);  // smoothed per-bar values
        let waveAnim = null;
        const WAVE_LERP = 0.18;  // smoothing factor (0=frozen, 1=instant)

        // ── Canvas setup ──
        function sizeCanvas() {
            const r = canvas.parentElement.getBoundingClientRect();
            canvas.width = r.width * devicePixelRatio;
            canvas.height = r.height * devicePixelRatio;
            ctx.scale(devicePixelRatio, devicePixelRatio);
        }
        sizeCanvas();
        window.addEventListener('resize', sizeCanvas);

        // ── Draw waveform ──
        // Render bars from smoothed array
        // Smooth color transitions — current render color lerps toward target
        let waveColorR = 59, waveColorG = 130, waveColorB = 246, waveColorA = 0.7;
        let waveTargetR = 59, waveTargetG = 130, waveTargetB = 246, waveTargetA = 0.7;
        let waveGlow = false;
        const COLOR_LERP = 0.06;

        function setWaveColor(r, g, b, a, glow) {
            waveTargetR = r; waveTargetG = g; waveTargetB = b; waveTargetA = a;
            waveGlow = !!glow;
        }

        function renderBars() {
            // Lerp color toward target
            waveColorR += (waveTargetR - waveColorR) * COLOR_LERP;
            waveColorG += (waveTargetG - waveColorG) * COLOR_LERP;
            waveColorB += (waveTargetB - waveColorB) * COLOR_LERP;
            waveColorA += (waveTargetA - waveColorA) * COLOR_LERP;

            const r = Math.round(waveColorR), g = Math.round(waveColorG), b = Math.round(waveColorB);
            const a = waveColorA.toFixed(2);
            const color = `rgba(${r},${g},${b},${a})`;

            const w = canvas.width / devicePixelRatio;
            const h = canvas.height / devicePixelRatio;
            ctx.clearRect(0, 0, w, h);

            // Soft glow layer behind bars (listening/speaking only)
            if (waveGlow) {
                ctx.save();
                ctx.filter = 'blur(6px)';
                ctx.globalAlpha = 0.3;
                drawBarPath(w, h, `rgba(${r},${g},${b},0.5)`);
                ctx.restore();
            }

            // Main bars
            drawBarPath(w, h, color);
        }

        function drawBarPath(w, h, color) {
            const bars = 48;
            const gap = 2.5;
            const barW = (w - (bars - 1) * gap) / bars;
            const radius = Math.min(barW / 2, 2);

            ctx.fillStyle = color;
            for (let i = 0; i < bars; i++) {
                const barH = Math.max(2, waveSmooth[i]);
                const x = i * (barW + gap);
                const y = (h - barH) / 2;

                ctx.beginPath();
                ctx.moveTo(x + radius, y);
                ctx.lineTo(x + barW - radius, y);
                ctx.quadraticCurveTo(x + barW, y, x + barW, y + radius);
                ctx.lineTo(x + barW, y + barH - radius);
                ctx.quadraticCurveTo(x + barW, y + barH, x + barW - radius, y + barH);
                ctx.lineTo(x + radius, y + barH);
                ctx.quadraticCurveTo(x, y + barH, x, y + barH - radius);
                ctx.lineTo(x, y + radius);
                ctx.quadraticCurveTo(x, y, x + radius, y);
                ctx.fill();
            }
        }

        // Per-bar energy targets (updated from audio callback)
        let barTargets = new Float32Array(48);
        let micEnergy = 0; // overall energy for scaling the ripple

        // Called from onaudioprocess to compute targets
        function updateBarTargets(raw) {
            const bars = 48;
            const step = Math.floor(raw.length / bars);
            let totalE = 0;
            for (let i = 0; i < bars; i++) {
                let sum = 0;
                for (let j = 0; j < step; j++) sum += Math.abs(raw[i * step + j] || 0);
                barTargets[i] = (sum / step) * 600;
                totalE += barTargets[i];
            }
            micEnergy = totalE / bars;
        }

        // 60fps listening loop — lerp toward targets + procedural ripple
        function animateListening() {
            if (uiState !== 'listening') return;
            setWaveColor(59, 130, 246, 0.75, true); // blue with glow
            const h = canvas.height / devicePixelRatio;
            const t = performance.now() / 1000;

            for (let i = 0; i < 48; i++) {
                const ripple = micEnergy * (
                    0.3 * Math.sin(t * 4.5 + i * 0.28)
                  + 0.2 * Math.sin(t * 7.1 + i * 0.45)
                  + 0.15 * Math.sin(t * 11 + i * 0.13)
                );
                const target = Math.min(h - 2, barTargets[i] + ripple);
                waveSmooth[i] += (target - waveSmooth[i]) * WAVE_LERP;
            }
            renderBars();
            waveAnim = requestAnimationFrame(animateListening);
        }

        function animateSpeaking() {
            if (uiState !== 'speaking') return;
            setWaveColor(16, 185, 129, 0.8, true); // green with glow
            const h = canvas.height / devicePixelRatio;
            const t = performance.now() / 1000;
            for (let i = 0; i < 48; i++) {
                const target = (0.02 + 0.03 * Math.sin(t * 3 + i * 0.15)
                              + 0.015 * Math.sin(t * 5.7 + i * 0.3)
                              + 0.008 * Math.random()) * 600;
                waveSmooth[i] += (Math.min(h - 2, target) - waveSmooth[i]) * 0.12;
            }
            renderBars();
            waveAnim = requestAnimationFrame(animateSpeaking);
        }

        function animateProcessing() {
            if (uiState !== 'processing') return;
            setWaveColor(245, 158, 11, 0.5, false); // amber, no glow
            const h = canvas.height / devicePixelRatio;
            const t = performance.now() / 1000;
            // Converging wave: bars pull toward center as "thinking"
            const center = 24;
            for (let i = 0; i < 48; i++) {
                const dist = Math.abs(i - center) / center;
                const target = (0.005 + 0.02 * (1 - dist) * Math.sin(t * 2.5 + i * 0.15)
                              + 0.008 * Math.sin(t * 4 + i * 0.3)) * 600;
                waveSmooth[i] += (Math.min(h - 2, target) - waveSmooth[i]) * 0.08;
            }
            renderBars();
            waveAnim = requestAnimationFrame(animateProcessing);
        }

        // Continuous-idle: subtle breathing bars — AI is alive and ready
        function animateContIdle() {
            if (uiState !== 'cont-idle') return;
            setWaveColor(59, 130, 246, 0.25, false); // dim blue, no glow
            const h = canvas.height / devicePixelRatio;
            const t = performance.now() / 1000;
            for (let i = 0; i < 48; i++) {
                const target = (0.004 + 0.006 * Math.sin(t * 1.2 + i * 0.12)
                              + 0.003 * Math.sin(t * 2.1 + i * 0.25)) * 600;
                waveSmooth[i] += (Math.min(h - 2, target) - waveSmooth[i]) * 0.06;
            }
            renderBars();
            waveAnim = requestAnimationFrame(animateContIdle);
        }

        // ── Haptic feedback ──
        function haptic(pattern) {
            if (navigator.vibrate) navigator.vibrate(pattern);
        }

        // ── Interrupt / Cancel ──
        function interruptSpeaking() {
            // Stop all queued and playing audio
            audioQ = [];
            playing = false;
            if (playCtx && playCtx.state !== 'closed') {
                playCtx.close().catch(() => {});
                playCtx = null;
            }
            haptic(30);
            audioDone();
        }

        function cancelProcessing() {
            streamTxt = '';
            curMsgEl = null;
            haptic(30);
            if (continuous) {
                if (paused) { setState('paused'); return; }
                setState('cont-idle');
                setTimeout(() => {
                    if (continuous && !paused && !recording) startRec();
                }, RELISTEN_DELAY);
            } else {
                setState('idle');
            }
        }

        // ── UI State Machine ──
        let prevState = 'idle';
        function setState(state, label) {
            const changed = state !== prevState;
            prevState = state;
            haptic(state === 'listening' ? 20 : state === 'speaking' ? [10, 30, 10] : 0);
            uiState = state;

            // Map cont-idle to CSS class
            const cssState = state === 'cont-idle' ? 'cont-idle' : state;
            voiceBar.className = 'voice-bar' + (cssState !== 'idle' ? ` state-${cssState}` : '');

            // Pulse animation on meaningful state transitions
            if (changed && (state === 'listening' || state === 'speaking' || state === 'processing')) {
                orbBtn.classList.remove('pulse');
                void orbBtn.offsetWidth; // force reflow to restart animation
                orbBtn.classList.add('pulse');
            }

            const icons = { idle: '🎙️', 'cont-idle': '🎙️', listening: '🎙️', processing: '⏳', speaking: '🔊', paused: '⏸️' };
            orbBtn.textContent = icons[state] || '🎙️';

            const labels = {
                idle: 'Hold to talk',
                'cont-idle': 'Ready — listening for you',
                listening: 'Listening…',
                processing: 'Thinking',
                speaking: 'Speaking…',
                paused: 'Paused — tap to resume',
            };
            const txt = label || labels[state];
            stateLbl.innerHTML = state === 'processing'
                ? `<span class="dots">${txt}</span>`
                : txt;

            // Waveform visible in active states and cont-idle (subtle breathing), hidden when idle or paused
            waveWrap.classList.toggle('visible', state !== 'idle' && state !== 'paused');

            // Mic level indicator — visible only when listening
            const showMicLevel = (state === 'listening');
            micLevelWrap.classList.toggle('visible', showMicLevel);
            micLevelLabel.classList.toggle('visible', showMicLevel);
            if (!showMicLevel) { micLevelBar.style.width = '0%'; micLevelLabel.textContent = ''; }

            // Screen wake lock — hold during active states, release when idle
            if (state === 'listening' || state === 'speaking' || state === 'processing' || state === 'cont-idle') requestWakeLock();
            else releaseWakeLock();

            // Show interrupt indicator on orb during speaking/processing
            orbBtn.classList.toggle('interruptable', state === 'speaking' || state === 'processing');

            if (waveAnim) { cancelAnimationFrame(waveAnim); waveAnim = null; }

            if (state === 'listening') animateListening();
            else if (state === 'speaking') animateSpeaking();
            else if (state === 'processing') animateProcessing();
            else if (state === 'cont-idle') animateContIdle();
            else if (state === 'idle' || state === 'paused') {
                waveSmooth.fill(0);
                ctx.clearRect(0, 0, canvas.width / devicePixelRatio, canvas.height / devicePixelRatio);
            }

            // Update keyboard hint
            updateHints();
        }

        function updateHints() {
            const hint = $('kbHint');
            const emptyText = $('emptyText');
            const emptySub = $('emptySub');
            if (continuous) {
                hint.innerHTML = '<kbd>Space</kbd> pause/resume · <kbd>Esc</kbd> pause';
                if (emptyText) emptyText.textContent = 'Ready when you are';
                if (emptySub) emptySub.textContent = 'Just start talking, or type below';
            } else {
                hint.innerHTML = '<kbd>Space</kbd> hold to talk · <kbd>Esc</kbd> stop';
                if (emptyText) emptyText.textContent = 'Ready when you are';
                if (emptySub) emptySub.textContent = 'Hold the mic button or type below';
            }
        }

        // ── Helpers ──
        function now() { const d = new Date(); return d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}); }

        function hideEmpty() { if (empty) empty.style.display = 'none'; }

        // ── Smart auto-scroll ──
        // Auto-scroll when near bottom; stop when user scrolls up to review history.
        let userScrolledUp = false;
        function isNearBottom() { return chat.scrollHeight - chat.scrollTop - chat.clientHeight < 80; }
        function scrollToBottom() { chat.scrollTop = chat.scrollHeight; userScrolledUp = false; jumpBottom.classList.remove('visible'); }
        function maybeScroll() { if (!userScrolledUp) scrollToBottom(); else jumpBottom.classList.add('visible'); }

        chat.addEventListener('scroll', () => {
            if (isNearBottom()) { userScrolledUp = false; jumpBottom.classList.remove('visible'); }
            else { userScrolledUp = true; }
        }, { passive: true });
        jumpBottom.addEventListener('click', scrollToBottom);

        function addMsg(role, text) {
            hideEmpty();
            const el = document.createElement('div');
            el.className = `msg msg-${role === 'user' ? 'user' : 'ai'}`;
            el.setAttribute('data-text', text);
            el.innerHTML = `
                <div class="msg-bubble">${role === 'user' ? esc(text) : md(text)}</div>
                <div class="msg-meta">
                    <span class="msg-time">${now()}</span>
                    <button class="msg-copy" title="Copy">📋</button>
                </div>`;
            el.querySelector('.msg-copy').addEventListener('click', e => {
                const raw = el.getAttribute('data-text');
                navigator.clipboard.writeText(raw).then(() => {
                    e.target.textContent = '✓';
                    e.target.classList.add('copied');
                    setTimeout(() => { e.target.textContent = '📋'; e.target.classList.remove('copied'); }, 1500);
                });
            });
            chat.appendChild(el);
            maybeScroll();
            return el;
        }

        function updateStream(text) {
            if (!curMsgEl) curMsgEl = addMsg('ai', text);
            else {
                curMsgEl.querySelector('.msg-bubble').innerHTML = md(text);
                maybeScroll();
            }
        }

        function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

        function md(s) {
            return s
                .replace(/```[\s\S]*?```/g, m => `<code>${esc(m.slice(3,-3))}</code>`)
                .replace(/`([^`]+)`/g, '<code>$1</code>')
                .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
                .replace(/\*([^*]+)\*/g, '<em>$1</em>')
                .replace(/^#{1,3}\s+(.+)$/gm, '<strong>$1</strong>')
                .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>')
                .replace(/\n/g, '<br>');
        }

        function showToast(msg) {
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 4000);
        }

        // ── WebSocket ──
        function connect() {
            if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }

            const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
            const key = new URLSearchParams(location.search).get('api_key') || localStorage.getItem('openclaw_api_key') || '';
            const base = location.pathname.replace(/\/$/, '');
            const path = base ? `${base}/ws` : '/ws';
            const url = key ? `${proto}//${location.host}${path}?api_key=${key}` : `${proto}//${location.host}${path}`;

            dot.className = 'status-dot'; connLbl.textContent = reconnectAttempts ? `Reconnecting (${reconnectAttempts})…` : 'Connecting';

            ws = new WebSocket(url);
            ws.onopen = () => {
                reconnectAttempts = 0;
                dot.className = 'status-dot on';
                connLbl.textContent = 'Connected';

                // Send conversation context so the AI remembers after server restart
                restoreServerContext();

                // Resume appropriate state based on mode
                if (continuous && !paused) {
                    setState('cont-idle');
                    setTimeout(() => { if (continuous && !paused && !recording) startRec(); }, 600);
                } else {
                    setState('idle');
                }
            };
            ws.onclose = e => {
                dot.className = 'status-dot err';
                // Stop recording cleanly on disconnect
                if (recording) {
                    recording = false;
                    disconnectAudio();
                }
                if (e.code >= 4001 && e.code <= 4003) {
                    connLbl.textContent = ['','API key required','Invalid key','Rate limited'][e.code-4000];
                    showToast(connLbl.textContent);
                    return; // Don't auto-reconnect on auth errors
                }
                reconnectAttempts++;
                const delay = Math.min(RECONNECT_BASE_MS * Math.pow(1.5, reconnectAttempts - 1), RECONNECT_MAX_MS);
                connLbl.textContent = `Reconnecting (${reconnectAttempts})…`;
                reconnectTimer = setTimeout(connect, delay);
            };
            ws.onerror = () => {}; // onclose handles reconnection
            ws.onmessage = e => {
                try { handle(JSON.parse(e.data)); }
                catch(err) { console.error('Bad WS message:', err); }
            };
        }

        function handle(m) {
            switch (m.type) {
                case 'listening_started':
                    setState('listening');
                    break;

                case 'listening_stopped':
                    setState('processing');
                    break;

                case 'partial_transcript':
                    // Live preview of what the user is saying
                    if (m.text && m.text.trim()) {
                        liveTranscript.textContent = m.text.trim();
                        liveTranscript.classList.add('visible');
                    }
                    break;

                case 'transcript':
                    // Clear live transcript when final arrives
                    liveTranscript.textContent = '';
                    liveTranscript.classList.remove('visible');
                    if (!m.text || m.text.trim().length < MIN_LEN) {
                        if (continuous) {
                            if (paused) { setState('paused'); break; }
                            setState('cont-idle');
                            setTimeout(() => { if (continuous && !paused && !recording) startRec(); }, RELISTEN_DELAY);
                        } else setState('idle');
                        break;
                    }
                    addMsg('user', m.text);
                    setState('processing');
                    // Cut off any audio still playing from previous response
                    audioQ = [];
                    if (playing) {
                        playing = false;
                        if (playCtx && playCtx.state !== 'closed') { playCtx.close().catch(() => {}); playCtx = null; }
                    }
                    streamTxt = ''; curMsgEl = null;
                    break;

                case 'response_chunk':
                    streamTxt += m.text;
                    updateStream(streamTxt);
                    if (uiState !== 'speaking') setState('speaking');
                    break;

                case 'audio_chunk':
                    queueAudio(m.data);
                    if (uiState !== 'speaking') setState('speaking');
                    break;

                case 'response_complete':
                    if (curMsgEl) {
                        curMsgEl.querySelector('.msg-bubble').innerHTML = md(m.text);
                        curMsgEl.setAttribute('data-text', m.text);
                    }
                    // In continuous mode, if no audio is playing, go back to listening (unless paused)
                    if (continuous && !paused && !recording && !playing)
                        setTimeout(() => { if (continuous && !paused && !recording && !playing) audioDone(); }, 500);
                    else if (continuous && paused && !playing)
                        setState('paused');
                    else if (!continuous && !playing)
                        setState('idle');
                    // Safety: if audio is playing, ensure we recover if audioDone never fires
                    else if (playing) {
                        setTimeout(() => {
                            if (uiState === 'processing' || uiState === 'speaking') {
                                playing = false;
                                audioDone();
                            }
                        }, 20000);
                    }
                    break;

                case 'vad_status':
                    if (m.speech_detected) speechDetected = true;
                    break;

                case 'audio_response':
                    playLegacy(m.data, m.sample_rate, audioDone);
                    setState('speaking');
                    break;

                case 'context_restored':
                    if (m.count > 0) console.log(`Server context restored: ${m.count} messages`);
                    break;

                case 'error':
                    showToast(m.message || 'Server error');
                    break;

                case 'pong': break;
            }
        }

        // ── Audio queue ──
        function queueAudio(b64) { audioQ.push(b64); if (!playing) playNext(); }

        async function playNext() {
            if (!audioQ.length) { playing = false; audioDone(); return; }
            playing = true;
            const data = audioQ.shift();
            try {
                const bin = atob(data);
                const bytes = new Uint8Array(bin.length);
                for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
                if (!playCtx || playCtx.state === 'closed')
                    { playCtx = new (window.AudioContext || window.webkitAudioContext)(); nextTime = 0; }
                const buf = await playCtx.decodeAudioData(bytes.buffer);
                const src = playCtx.createBufferSource();
                src.buffer = buf;
                src.playbackRate.value = settings.speed / 100;
                // Volume via gain node
                if (!gainNode || gainNode.context !== playCtx) {
                    gainNode = playCtx.createGain();
                    gainNode.connect(playCtx.destination);
                }
                gainNode.gain.value = settings.volume / 100;
                src.connect(gainNode);
                const at = Math.max(nextTime, playCtx.currentTime);
                nextTime = at + buf.duration;
                src.onended = () => { if (!audioQ.length) { playCtx.close(); playCtx = null; } playNext(); };
                src.start(at);
            } catch(e) { console.error('audio err', e); playNext(); }
        }

        function audioDone() {
            if (continuous) {
                if (paused) { setState('paused'); return; }
                setState('cont-idle');
                setTimeout(() => {
                    if (continuous && !paused && !recording) startRec();
                }, RELISTEN_DELAY);
            } else setState('idle');
        }

        function playLegacy(b64, sr, cb) {
            const ac = new AudioContext({ sampleRate: sr });
            const bin = atob(b64);
            const bytes = new Uint8Array(bin.length);
            for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
            const f32 = new Float32Array(bytes.buffer);
            const buf = ac.createBuffer(1, f32.length, sr);
            buf.getChannelData(0).set(f32);
            const src = ac.createBufferSource();
            src.buffer = buf; src.connect(ac.destination);
            if (cb) src.onended = cb;
            src.start();
        }

        // ── Pre-warm audio pipeline ──
        // Request mic + create AudioContext + load worklet on first interaction.
        // Makes startRec() near-instant — no waiting for permissions or module loading.
        let preWarmed = false;
        async function preWarmAudio() {
            if (preWarmed) return;
            preWarmed = true;
            try {
                if (!mic) mic = await navigator.mediaDevices.getUserMedia({
                    audio: { sampleRate: 16000, channelCount: 1, echoCancellation: true, noiseSuppression: true }
                });
                if (!audioCtx || audioCtx.state === 'closed') {
                    audioCtx = new AudioContext({ sampleRate: 16000 });
                    await audioCtx.suspend(); // don't consume resources yet
                }
                if (!workletReady && audioCtx.audioWorklet) {
                    try {
                        await audioCtx.audioWorklet.addModule('/audio-processor.js');
                        workletReady = true;
                    } catch(e) { console.warn('Worklet pre-warm failed:', e); }
                }
                console.log('Audio pipeline pre-warmed');
            } catch(e) { console.warn('Pre-warm failed:', e); preWarmed = false; }
        }
        // Trigger on first click/touch/keydown anywhere
        const preWarmEvents = ['click', 'touchstart', 'keydown'];
        function onFirstInteraction() {
            preWarmEvents.forEach(e => document.removeEventListener(e, onFirstInteraction));
            preWarmAudio();
        }
        preWarmEvents.forEach(e => document.addEventListener(e, onFirstInteraction, { once: false, passive: true }));

        // ── Recording (AudioWorklet) ──
        // AudioWorklet runs audio capture on a dedicated thread — no main-thread glitches.
        // Falls back to ScriptProcessorNode if AudioWorklet is unavailable.
        let lastSound = Date.now();

        // Handle messages from AudioWorklet processor
        function onWorkletMessage(e) {
            const msg = e.data;
            if (msg.type !== 'audio' || !recording || !ws || ws.readyState !== 1) return;
            // Echo gate: skip audio chunks while TTS is playing to prevent
            // the AI from hearing and transcribing its own voice
            if (playing) return;

            const d = new Float32Array(msg.buffer);

            // Send audio to server
            const b = new Uint8Array(d.buffer);
            let s = ''; for (let i = 0; i < b.length; i++) s += String.fromCharCode(b[i]);
            ws.send(JSON.stringify({ type: 'audio', data: btoa(s) }));

            // Update bar targets (rendered at 60fps by animateListening)
            updateBarTargets(d);

            // Update mic level indicator
            const pct = Math.min(100, (msg.energy || 0) * 800);
            micLevelBar.style.width = pct + '%';
            micLevelBar.classList.toggle('hot', pct > 85);
            micLevelBar.classList.toggle('warm', pct > 50 && pct <= 85);
            if (pct < 3) micLevelLabel.textContent = 'No input detected';
            else micLevelLabel.textContent = '';

            // Silence detect in continuous mode (adaptive threshold)
            if (continuous) {
                const energy = msg.energy || 0;
                if (energy > 0.005) { // lower threshold — catches "umm", quiet speech
                    lastSound = Date.now();
                    waveWrap.classList.remove('silence-detected');
                } else if (speechDetected) {
                    const silenceMs = Date.now() - lastSound;
                    // Adaptive: longer speech = more pause tolerance (up to 2x)
                    const speechDur = Date.now() - recStart;
                    const adaptiveSilence = Math.min(SILENCE_MS + (speechDur / 5000) * 1000, SILENCE_MS * 2);
                    // Show "finishing..." hint after 40% of threshold
                    if (silenceMs > adaptiveSilence * 0.4) waveWrap.classList.add('silence-detected');
                    if (silenceMs > adaptiveSilence) stopRec();
                }
            }
        }

        // ScriptProcessorNode fallback (deprecated but universal)
        function setupFallbackProcessor() {
            const proc = audioCtx.createScriptProcessor(4096, 1, 1);
            proc.onaudioprocess = e => {
                if (!recording || !ws || ws.readyState !== 1) return;
                if (playing) return; // echo gate
                const d = e.inputBuffer.getChannelData(0);
                const b = new Uint8Array(d.buffer.slice(0));
                let s = ''; for (let i = 0; i < b.length; i++) s += String.fromCharCode(b[i]);
                ws.send(JSON.stringify({ type: 'audio', data: btoa(s) }));
                updateBarTargets(d);
                let energy = 0; for (let i = 0; i < d.length; i++) energy += Math.abs(d[i]); energy /= d.length;
                const pct = Math.min(100, energy * 800);
                micLevelBar.style.width = pct + '%';
                micLevelBar.classList.toggle('hot', pct > 85);
                micLevelBar.classList.toggle('warm', pct > 50 && pct <= 85);
                if (pct < 3) micLevelLabel.textContent = 'No input detected';
                else micLevelLabel.textContent = '';
                if (continuous) {
                    if (energy > 0.005) { lastSound = Date.now(); waveWrap.classList.remove('silence-detected'); }
                    else if (speechDetected) {
                        const silenceMs = Date.now() - lastSound;
                        const speechDur = Date.now() - recStart;
                        const adaptiveSilence = Math.min(SILENCE_MS + (speechDur / 5000) * 1000, SILENCE_MS * 2);
                        if (silenceMs > adaptiveSilence * 0.4) waveWrap.classList.add('silence-detected');
                        if (silenceMs > adaptiveSilence) stopRec();
                    }
                }
            };
            return proc;
        }

        function disconnectAudio() {
            // Disconnect worklet/processor but keep AudioContext + mic + filter alive in continuous mode
            if (workletNode) {
                try { workletNode.port.postMessage({ type: 'stop' }); } catch(e) {}
                workletNode.disconnect(); workletNode = null;
            }
            if (hpFilter) { try { hpFilter.disconnect(); } catch(e) {} }
            if (audioSrc) { audioSrc.disconnect(); audioSrc = null; }
        }

        async function startRec() {
            if (recording) return;
            try {
                // Acquire mic if we don't have one
                if (!mic) mic = await navigator.mediaDevices.getUserMedia({
                    audio: { sampleRate: 16000, channelCount: 1, echoCancellation: true, noiseSuppression: true }
                });

                // Reuse AudioContext in continuous mode when possible
                if (!audioCtx || audioCtx.state === 'closed') {
                    audioCtx = new AudioContext({ sampleRate: 16000 });
                    workletReady = false;
                }
                if (audioCtx.state === 'suspended') {
                    await audioCtx.resume();
                }

                // Load AudioWorklet module once per AudioContext
                if (!workletReady && audioCtx.audioWorklet) {
                    try {
                        await audioCtx.audioWorklet.addModule('/audio-processor.js');
                        workletReady = true;
                    } catch (wErr) {
                        console.warn('AudioWorklet load failed, using fallback:', wErr);
                    }
                }

                audioSrc = audioCtx.createMediaStreamSource(mic);
                lastSound = Date.now();

                // High-pass filter at 80Hz — removes HVAC rumble, desk vibration,
                // handling noise before audio reaches the processor
                if (!hpFilter || hpFilter.context !== audioCtx) {
                    hpFilter = audioCtx.createBiquadFilter();
                    hpFilter.type = 'highpass';
                    hpFilter.frequency.value = 80;
                    hpFilter.Q.value = 0.7; // Butterworth-like, no resonance peak
                }

                if (workletReady) {
                    // AudioWorklet path — audio processing on dedicated thread
                    workletNode = new AudioWorkletNode(audioCtx, 'voice-processor');
                    workletNode.port.onmessage = onWorkletMessage;
                    workletNode.port.postMessage({ type: 'start' });
                    audioSrc.connect(hpFilter);
                    hpFilter.connect(workletNode);
                    workletNode.connect(audioCtx.destination); // required to keep processing alive
                } else {
                    // Fallback: ScriptProcessorNode (main thread, deprecated)
                    workletNode = setupFallbackProcessor();
                    audioSrc.connect(hpFilter);
                    hpFilter.connect(workletNode);
                    workletNode.connect(audioCtx.destination);
                }

                recording = true; speechDetected = false; recStart = Date.now();
                liveTranscript.textContent = ''; liveTranscript.classList.remove('visible');
                waveWrap.classList.remove('silence-detected');
                setState('listening');
                ws.send(JSON.stringify({ type: 'start_listening' }));
            } catch(err) { showToast('Mic error: ' + err.message); }
        }

        function stopRec() {
            if (!recording) return;
            const dur = Date.now() - recStart;
            const short = dur < MIN_DUR;
            recording = false;

            disconnectAudio();
            if (!continuous) {
                if (audioCtx) { audioCtx.close(); audioCtx = null; workletReady = false; }
                if (mic) { mic.getTracks().forEach(t => t.stop()); mic = null; }
            }

            if (ws && ws.readyState === 1) {
                if (continuous && (short || !speechDetected)) {
                    ws.send(JSON.stringify({ type: 'cancel_listening' }));
                    if (paused) { setState('paused'); return; }
                    // Quick restart — no state flash, stay in cont-idle briefly
                    setState('cont-idle');
                    setTimeout(() => {
                        if (continuous && !paused && !recording) startRec();
                    }, RELISTEN_DELAY);
                    return;
                }
                ws.send(JSON.stringify({ type: 'stop_listening' }));
                setState('processing');
            }
        }

        // Pause/resume continuous mode
        function pauseContinuous() {
            if (!continuous || paused) return;
            paused = true;
            if (recording) {
                recording = false;
                disconnectAudio();
                if (ws && ws.readyState === 1) {
                    ws.send(JSON.stringify({ type: 'cancel_listening' }));
                }
            }
            setState('paused');
            haptic(40);
            console.log('Continuous mode paused');
        }

        function resumeContinuous() {
            if (!continuous || !paused) return;
            paused = false;
            setState('cont-idle');
            haptic(20);
            setTimeout(() => {
                if (continuous && !paused && !recording) startRec();
            }, RELISTEN_DELAY);
            console.log('Continuous mode resumed');
        }

        function togglePause() {
            paused ? resumeContinuous() : pauseContinuous();
        }

        // Clean teardown when leaving continuous mode
        function teardownContinuous() {
            paused = false;
            if (recording) stopRec();
            disconnectAudio();
            hpFilter = null;
            if (audioCtx) { audioCtx.close(); audioCtx = null; workletReady = false; }
            if (mic) { mic.getTracks().forEach(t => t.stop()); mic = null; }
        }

        // ── Events ──
        orbBtn.addEventListener('mousedown', () => { if (!continuous) startRec(); });
        orbBtn.addEventListener('mouseup', () => { if (!continuous) stopRec(); });
        orbBtn.addEventListener('mouseleave', () => { if (!continuous && recording) stopRec(); });
        orbBtn.addEventListener('touchstart', e => { e.preventDefault(); if (!continuous) startRec(); });
        orbBtn.addEventListener('touchend', () => { if (!continuous) stopRec(); });
        orbBtn.addEventListener('click', () => {
            if (uiState === 'speaking') { interruptSpeaking(); return; }
            if (uiState === 'processing') { cancelProcessing(); return; }
            if (continuous) {
                if (paused) { resumeContinuous(); }
                else if (uiState === 'listening' || uiState === 'cont-idle') { pauseContinuous(); }
                else { startRec(); }
            }
        });

        document.addEventListener('keydown', e => {
            // Don't hijack Space when typing in the text input
            const isTyping = e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA';
            if (e.code === 'Space' && !e.repeat && !isTyping) {
                e.preventDefault();
                if (uiState === 'speaking') { interruptSpeaking(); return; }
                if (uiState === 'processing') { cancelProcessing(); return; }
                // In continuous mode, Space toggles pause
                if (continuous) {
                    togglePause();
                } else {
                    recording ? stopRec() : startRec();
                }
            }
            if (e.code === 'Escape') {
                if (isTyping) { e.target.blur(); return; }
                if (uiState === 'speaking') interruptSpeaking();
                else if (uiState === 'processing') cancelProcessing();
                else if (recording) stopRec();
                // Esc also pauses continuous mode
                else if (continuous && !paused) pauseContinuous();
            }
        });

        // ── Mode Switcher ──
        const modePush = $('modePush');
        const modeCont = $('modeCont');

        function setMode(mode) {
            const wasContinuous = continuous;
            continuous = (mode === 'continuous');
            localStorage.setItem('voiceControlContinuous', continuous);

            // Update button states
            modePush.classList.toggle('active', !continuous);
            modeCont.classList.toggle('active', continuous);

            if (continuous && !wasContinuous) {
                // Switching TO continuous — auto-start listening
                setState('cont-idle');
                updateHints();
                // Small delay then start recording
                setTimeout(() => {
                    if (continuous && !recording) startRec();
                }, 400);
            } else if (!continuous && wasContinuous) {
                // Switching FROM continuous — clean teardown
                teardownContinuous();
                setState('idle');
                updateHints();
            }
        }

        modePush.addEventListener('click', () => setMode('push'));
        modeCont.addEventListener('click', () => setMode('continuous'));

        // ── Text Input ──
        const textInput = $('textInput');
        const sendBtn = $('sendBtn');

        function sendTextMessage() {
            const text = textInput.value.trim();
            if (!text || !ws || ws.readyState !== 1) return;

            // Cancel any active recording to prevent overlapping responses
            if (recording) {
                recording = false;
                disconnectAudio();
                if (ws.readyState === 1) ws.send(JSON.stringify({ type: 'cancel_listening' }));
            }

            // Cut off any audio still playing from previous response
            audioQ = [];
            if (playing) {
                playing = false;
                if (playCtx && playCtx.state !== 'closed') { playCtx.close().catch(() => {}); playCtx = null; }
            }

            // Show user message in chat
            addMsg('user', text);
            textInput.value = '';
            sendBtn.disabled = true;

            // Send as text message to server
            ws.send(JSON.stringify({ type: 'text_message', text }));

            // Set processing state
            setState('processing');
            streamTxt = ''; curMsgEl = null;
        }

        textInput.addEventListener('input', () => {
            sendBtn.disabled = !textInput.value.trim();
        });

        textInput.addEventListener('keydown', e => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendTextMessage();
            }
            // Prevent Space from triggering voice when typing
            e.stopPropagation();
        });

        sendBtn.addEventListener('click', sendTextMessage);

        // ── Settings Panel ──
        const settingsPanel = $('settingsPanel');
        const settingsOverlay = $('settingsOverlay');

        function openSettings() { settingsPanel.classList.add('open'); settingsOverlay.classList.add('open'); }
        function closeSettings() { settingsPanel.classList.remove('open'); settingsOverlay.classList.remove('open'); }

        const settingsBtn = $('settingsBtn');
        if (settingsBtn) settingsBtn.addEventListener('click', openSettings);
        $('settingsClose').addEventListener('click', closeSettings);
        settingsOverlay.addEventListener('click', closeSettings);

        // Sliders
        $('volumeSlider').value = settings.volume;
        $('volumeVal').textContent = settings.volume + '%';
        $('volumeSlider').addEventListener('input', e => {
            settings.volume = parseInt(e.target.value);
            $('volumeVal').textContent = settings.volume + '%';
            localStorage.setItem('vc_volume', settings.volume);
            if (gainNode) gainNode.gain.value = settings.volume / 100;
        });

        $('speedSlider').value = settings.speed;
        $('speedVal').textContent = (settings.speed / 100).toFixed(1) + 'x';
        $('speedSlider').addEventListener('input', e => {
            settings.speed = parseInt(e.target.value);
            $('speedVal').textContent = (settings.speed / 100).toFixed(1) + 'x';
            localStorage.setItem('vc_speed', settings.speed);
        });

        $('silenceSlider').value = settings.silence;
        $('silenceVal').textContent = (settings.silence / 1000).toFixed(1) + 's';
        $('silenceSlider').addEventListener('input', e => {
            settings.silence = parseInt(e.target.value);
            SILENCE_MS = settings.silence;
            $('silenceVal').textContent = (settings.silence / 1000).toFixed(1) + 's';
            localStorage.setItem('vc_silence', settings.silence);
        });

        // ── Context Recovery ──
        // Send conversation history to server on connect so AI remembers
        // even after server restart. Uses current session's saved messages.
        function restoreServerContext() {
            if (!ws || ws.readyState !== 1) return;
            if (!activeSessionId) return;
            const msgs = getSessionMsgs(activeSessionId);
            if (!msgs.length) return;

            // Convert to role/text pairs, send last 20 turns
            const history = msgs.slice(-20).map(m => ({
                role: m.role === 'user' ? 'user' : 'assistant',
                text: m.text || '',
            })).filter(m => m.text.trim());

            if (history.length) {
                ws.send(JSON.stringify({ type: 'context_restore', messages: history }));
            }
        }

        // ── Multi-Session Management ──
        const SESSIONS_INDEX = 'vc_sessions';   // [{id, title, created, updated}]
        const ACTIVE_KEY = 'vc_active';          // active session id
        let activeSessionId = null;

        function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 6); }

        function getSessions() {
            try { return JSON.parse(localStorage.getItem(SESSIONS_INDEX) || '[]'); } catch { return []; }
        }

        function saveSessions(list) {
            try { localStorage.setItem(SESSIONS_INDEX, JSON.stringify(list)); } catch(e) { /* quota */ }
        }

        function getSessionMsgs(id) {
            try { return JSON.parse(localStorage.getItem('vc_s_' + id) || '[]'); } catch { return []; }
        }

        function saveSessionMsgs(id, msgs) {
            try { localStorage.setItem('vc_s_' + id, JSON.stringify(msgs)); } catch(e) { /* quota */ }
        }

        function collectMsgs() {
            const msgs = [];
            chat.querySelectorAll('.msg').forEach(m => {
                msgs.push({
                    role: m.classList.contains('msg-user') ? 'user' : 'ai',
                    text: m.getAttribute('data-text') || m.querySelector('.msg-bubble')?.textContent || '',
                    time: m.querySelector('.msg-time')?.textContent || '',
                });
            });
            return msgs;
        }

        function saveCurrentSession() {
            if (!activeSessionId) return;
            const msgs = collectMsgs();
            saveSessionMsgs(activeSessionId, msgs);

            // Update title + timestamp in index
            const sessions = getSessions();
            const s = sessions.find(x => x.id === activeSessionId);
            if (s) {
                s.updated = Date.now();
                if (!s.title && msgs.length) {
                    const first = msgs.find(m => m.role === 'user');
                    if (first) s.title = first.text.slice(0, 50);
                }
                saveSessions(sessions);
            }
            renderSidebar();
        }

        function loadSession(id) {
            // Save current first
            if (activeSessionId && activeSessionId !== id) saveCurrentSession();

            activeSessionId = id;
            localStorage.setItem(ACTIVE_KEY, id);

            // Clear chat
            chat.innerHTML = '';

            const msgs = getSessionMsgs(id);
            if (!msgs.length) {
                empty.style.display = '';
                chat.appendChild(empty);
            } else {
                hideEmpty();
                msgs.forEach(m => {
                    const el = addMsg(m.role, m.text);
                    const timeEl = el.querySelector('.msg-time');
                    if (timeEl && m.time) timeEl.textContent = m.time;
                });
            }

            // Reset backend conversation
            if (ws && ws.readyState === 1) ws.send(JSON.stringify({ type: 'new_session' }));
            renderSidebar();
        }

        function createNewSession() {
            if (activeSessionId) saveCurrentSession();
            const id = genId();
            const sessions = getSessions();
            sessions.unshift({ id, title: '', created: Date.now(), updated: Date.now() });
            saveSessions(sessions);
            loadSession(id);
            closeSidebar();
        }

        function deleteSession(id) {
            let sessions = getSessions();
            sessions = sessions.filter(s => s.id !== id);
            saveSessions(sessions);
            localStorage.removeItem('vc_s_' + id);

            if (id === activeSessionId) {
                if (sessions.length) loadSession(sessions[0].id);
                else createNewSession();
            }
            renderSidebar();
        }

        // ── Sidebar Rendering ──
        const sessionList = $('sessionList');

        function renderSidebar() {
            const sessions = getSessions();
            sessionList.innerHTML = '';

            if (!sessions.length) {
                sessionList.innerHTML = '<div style="padding:16px;text-align:center;color:var(--text-muted);font-size:0.75rem;">No conversations yet</div>';
                return;
            }

            // Group by date
            const today = new Date().toDateString();
            const yesterday = new Date(Date.now() - 86400000).toDateString();

            sessions.forEach(s => {
                const el = document.createElement('div');
                el.className = 'session-item' + (s.id === activeSessionId ? ' active' : '');

                const d = new Date(s.updated || s.created);
                const dateStr = d.toDateString() === today ? 'Today'
                    : d.toDateString() === yesterday ? 'Yesterday'
                    : d.toLocaleDateString([], { month: 'short', day: 'numeric' });

                el.innerHTML = `
                    <div class="session-info">
                        <div class="session-title">${esc(s.title || 'New conversation')}</div>
                        <div class="session-date">${dateStr}</div>
                    </div>
                    <button class="session-delete" title="Delete">🗑</button>`;

                el.querySelector('.session-info').addEventListener('click', () => loadSession(s.id));
                el.querySelector('.session-delete').addEventListener('click', e => {
                    e.stopPropagation();
                    deleteSession(s.id);
                });

                sessionList.appendChild(el);
            });
        }

        // ── Sidebar Toggle ──
        const sidebar = $('sidebar');
        const backdrop = $('sidebarBackdrop');
        // Default to collapsed sidebar for clean first impression
        const sidebarPref = localStorage.getItem('vc_sidebar');
        const sidebarCollapsed = sidebarPref === null ? true : sidebarPref === 'collapsed';

        function openSidebar() { sidebar.classList.remove('collapsed'); backdrop.classList.add('show'); localStorage.setItem('vc_sidebar', 'open'); }
        function closeSidebar() { sidebar.classList.add('collapsed'); backdrop.classList.remove('show'); localStorage.setItem('vc_sidebar', 'collapsed'); }
        function toggleSidebar() { sidebar.classList.contains('collapsed') ? openSidebar() : closeSidebar(); }

        $('hamburgerBtn').addEventListener('click', toggleSidebar);
        const sidebarCloseBtn = $('sidebarClose');
        if (sidebarCloseBtn) sidebarCloseBtn.addEventListener('click', closeSidebar);
        backdrop.addEventListener('click', closeSidebar);
        $('newChatBtn').addEventListener('click', createNewSession);

        if (sidebarCollapsed) sidebar.classList.add('collapsed');

        // ── Export ──
        function exportTranscript() {
            const msgs = chat.querySelectorAll('.msg');
            if (!msgs.length) { showToast('No messages to export'); return; }
            let text = '# Voice Control Transcript\n# ' + new Date().toLocaleString() + '\n\n';
            msgs.forEach(m => {
                const role = m.classList.contains('msg-user') ? 'You' : 'AI';
                const time = m.querySelector('.msg-time')?.textContent || '';
                const content = m.getAttribute('data-text') || m.querySelector('.msg-bubble')?.textContent || '';
                text += `[${time}] ${role}: ${content}\n\n`;
            });
            const blob = new Blob([text], { type: 'text/markdown' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `voice-transcript-${new Date().toISOString().slice(0,10)}.md`;
            a.click();
            URL.revokeObjectURL(url);
            showToast('Transcript exported');
        }
        $('exportBtn').addEventListener('click', () => { exportTranscript(); closeSettings(); });
        $('exportAllBtn').addEventListener('click', exportTranscript);
        $('settingsBtnSidebar').addEventListener('click', () => { openSettings(); closeSidebar(); });

        $('clearHistoryBtn').addEventListener('click', () => {
            getSessions().forEach(s => localStorage.removeItem('vc_s_' + s.id));
            localStorage.removeItem(SESSIONS_INDEX);
            createNewSession();
            showToast('All history cleared');
            closeSettings();
        });

        // Auto-save after each message
        const origAddMsg = addMsg;
        addMsg = function(role, text) {
            const el = origAddMsg(role, text);
            setTimeout(saveCurrentSession, 100);
            return el;
        };

        const origHandle = handle;
        handle = function(m) {
            origHandle(m);
            if (m.type === 'response_complete') setTimeout(saveCurrentSession, 200);
        };

        // ── Migrate old single-session data ──
        function migrateOldSession() {
            const old = localStorage.getItem('vc_messages');
            if (!old) return;
            try {
                const msgs = JSON.parse(old);
                if (msgs.length) {
                    const id = genId();
                    saveSessionMsgs(id, msgs);
                    const first = msgs.find(m => m.role === 'user');
                    saveSessions([{ id, title: first ? first.text.slice(0, 50) : 'Migrated', created: Date.now(), updated: Date.now() }]);
                    activeSessionId = id;
                    localStorage.setItem(ACTIVE_KEY, id);
                }
                localStorage.removeItem('vc_messages');
            } catch(e) { localStorage.removeItem('vc_messages'); }
        }

        // ── Init Sessions ──
        migrateOldSession();
        const sessions = getSessions();
        const savedActive = localStorage.getItem(ACTIVE_KEY);
        if (savedActive && sessions.find(s => s.id === savedActive)) {
            loadSession(savedActive);
        } else if (sessions.length) {
            loadSession(sessions[0].id);
        } else {
            createNewSession();
        }
        renderSidebar();

        // Restore mode from localStorage
        if (continuous) {
            modePush.classList.remove('active');
            modeCont.classList.add('active');
        }
        updateHints();
        // connect() handles continuous mode auto-start via onopen
        connect();
        setInterval(() => { if (ws && ws.readyState === 1) ws.send(JSON.stringify({ type: 'ping' })); }, 30000);
    })();
    </script>
</body>
</html>
