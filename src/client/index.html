<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🦞 Voice Control</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0f;
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ── Header ── */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 20px;
            border-bottom: 1px solid #1a1a2e;
            background: #0d0d14;
            flex-shrink: 0;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header h1 {
            font-size: 1.1rem;
            font-weight: 600;
            color: #fff;
        }

        .connection-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #444;
            transition: background 0.3s;
        }

        .connection-dot.connected { background: #4ade80; }
        .connection-dot.error { background: #f87171; }

        .header-controls {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .mode-toggle {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.8rem;
            color: #888;
        }

        .mode-toggle label {
            cursor: pointer;
        }

        .toggle-switch {
            position: relative;
            width: 40px;
            height: 22px;
        }

        .toggle-switch input { opacity: 0; width: 0; height: 0; }

        .toggle-slider {
            position: absolute;
            cursor: pointer;
            inset: 0;
            background: #2a2a3e;
            border-radius: 22px;
            transition: 0.3s;
        }

        .toggle-slider:before {
            position: absolute;
            content: "";
            height: 16px;
            width: 16px;
            left: 3px;
            bottom: 3px;
            background: #888;
            border-radius: 50%;
            transition: 0.3s;
        }

        .toggle-switch input:checked + .toggle-slider {
            background: #1e3a5f;
        }

        .toggle-switch input:checked + .toggle-slider:before {
            transform: translateX(18px);
            background: #60a5fa;
        }

        .clear-btn {
            background: none;
            border: 1px solid #2a2a3e;
            color: #666;
            padding: 4px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.75rem;
            transition: all 0.2s;
        }

        .clear-btn:hover { border-color: #444; color: #aaa; }

        /* ── Chat Area ── */
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scroll-behavior: smooth;
        }

        .chat-area::-webkit-scrollbar { width: 4px; }
        .chat-area::-webkit-scrollbar-track { background: transparent; }
        .chat-area::-webkit-scrollbar-thumb { background: #2a2a3e; border-radius: 4px; }

        .message {
            display: flex;
            gap: 10px;
            max-width: 80%;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .message.user .message-avatar {
            background: #1e3a5f;
        }

        .message.assistant .message-avatar {
            background: #1a2e1a;
        }

        .message-bubble {
            padding: 10px 14px;
            border-radius: 16px;
            line-height: 1.5;
            font-size: 0.9rem;
        }

        .message.user .message-bubble {
            background: #1e3a5f;
            color: #d0e0ff;
            border-bottom-right-radius: 4px;
        }

        .message.assistant .message-bubble {
            background: #1a1a2e;
            color: #d0d0e0;
            border-bottom-left-radius: 4px;
        }

        .message-bubble a { color: #60a5fa; text-decoration: none; }
        .message-bubble a:hover { text-decoration: underline; }
        .message-bubble strong { color: #fff; }
        .message-bubble code {
            background: rgba(255,255,255,0.08);
            padding: 1px 5px;
            border-radius: 3px;
            font-size: 0.85em;
        }

        /* Live transcript preview */
        .live-preview {
            align-self: flex-end;
            max-width: 80%;
            display: none;
            animation: fadeIn 0.2s ease;
        }

        .live-preview.visible { display: flex; }

        .live-preview .message-bubble {
            background: #1e3a5f;
            color: #90b8e8;
            border: 1px dashed #2a4a6f;
            font-style: italic;
            border-bottom-right-radius: 4px;
        }

        /* ── Voice Control Bar ── */
        .voice-bar {
            padding: 16px 20px;
            border-top: 1px solid #1a1a2e;
            background: #0d0d14;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }

        /* Waveform Visualizer */
        .waveform-container {
            width: 100%;
            max-width: 500px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 2px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .waveform-container.active { opacity: 1; }

        .waveform-bar {
            width: 3px;
            background: #60a5fa;
            border-radius: 2px;
            height: 4px;
            transition: height 0.05s ease;
        }

        .waveform-container.speaking .waveform-bar {
            background: #4ade80;
        }

        /* Voice Button + Status */
        .voice-controls {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .voice-button {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            border: 2px solid #2a2a3e;
            background: #1a1a2e;
            color: #888;
            font-size: 1.4rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .voice-button:hover {
            border-color: #444;
            color: #ccc;
        }

        .voice-button.listening {
            border-color: #60a5fa;
            background: #1e3a5f;
            color: #60a5fa;
            animation: breathe 2s ease-in-out infinite;
        }

        .voice-button.processing {
            border-color: #f59e0b;
            color: #f59e0b;
        }

        .voice-button.speaking {
            border-color: #4ade80;
            background: #1a2e1a;
            color: #4ade80;
        }

        @keyframes breathe {
            0%, 100% { box-shadow: 0 0 0 0 rgba(96, 165, 250, 0.3); }
            50% { box-shadow: 0 0 0 12px rgba(96, 165, 250, 0); }
        }

        .status-text {
            font-size: 0.8rem;
            color: #666;
            min-width: 160px;
        }

        .status-text.active { color: #60a5fa; }
        .status-text.processing { color: #f59e0b; }
        .status-text.speaking { color: #4ade80; }

        /* Thinking dots */
        .thinking-dots {
            display: none;
        }

        .thinking-dots.visible {
            display: inline-flex;
            gap: 4px;
            align-items: center;
            margin-left: 4px;
        }

        .thinking-dots span {
            width: 4px;
            height: 4px;
            background: #f59e0b;
            border-radius: 50%;
            animation: dotBounce 1.4s ease-in-out infinite;
        }

        .thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
        .thinking-dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes dotBounce {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
            40% { transform: scale(1); opacity: 1; }
        }

        /* Keyboard hint */
        .keyboard-hint {
            font-size: 0.7rem;
            color: #444;
        }

        .keyboard-hint kbd {
            background: #1a1a2e;
            border: 1px solid #2a2a3e;
            border-radius: 3px;
            padding: 1px 5px;
            font-size: 0.7rem;
            font-family: inherit;
        }

        /* Footer */
        .footer {
            padding: 8px 20px;
            text-align: center;
            font-size: 0.7rem;
            color: #333;
            border-top: 1px solid #111;
            flex-shrink: 0;
        }

        .footer a { color: #444; text-decoration: none; }
        .footer a:hover { color: #666; }

        /* Error toast */
        .error-toast {
            position: fixed;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            background: #7f1d1d;
            color: #fca5a5;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 0.8rem;
            display: none;
            z-index: 10;
            animation: fadeIn 0.3s ease;
        }

        .error-toast.visible { display: block; }

        /* Empty state */
        .empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            color: #333;
        }

        .empty-state .emoji { font-size: 2.5rem; }
        .empty-state p { font-size: 0.85rem; }

        /* Mobile */
        @media (max-width: 600px) {
            .message { max-width: 90%; }
            .header h1 { font-size: 0.95rem; }
            .voice-button { width: 64px; height: 64px; font-size: 1.6rem; }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <div class="header-left">
            <h1>🦞 Voice Control</h1>
            <div class="connection-dot" id="connectionDot"></div>
        </div>
        <div class="header-controls">
            <div class="mode-toggle">
                <label class="toggle-switch">
                    <input type="checkbox" id="continuousMode">
                    <span class="toggle-slider"></span>
                </label>
                <label for="continuousMode">Continuous</label>
            </div>
            <button class="clear-btn" id="clearBtn">Clear</button>
        </div>
    </div>

    <!-- Chat Area -->
    <div class="chat-area" id="chatArea">
        <div class="empty-state" id="emptyState">
            <div class="emoji">🎙️</div>
            <p>Hold the mic button or enable continuous mode</p>
        </div>
    </div>

    <!-- Error Toast -->
    <div class="error-toast" id="errorToast"></div>

    <!-- Voice Control Bar -->
    <div class="voice-bar">
        <!-- Waveform -->
        <div class="waveform-container" id="waveform"></div>

        <!-- Controls -->
        <div class="voice-controls">
            <button class="voice-button" id="voiceBtn">🎙️</button>
            <div>
                <div class="status-text" id="status">
                    Ready
                </div>
                <div class="keyboard-hint">
                    <kbd>Space</kbd> to talk
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <div class="footer">
        Made with 🦞 by <a href="https://github.com/OpenCnid" target="_blank">Cnid</a>
        · <a href="https://github.com/OpenCnid/openclaw-voice-control" target="_blank">GitHub</a>
    </div>

    <script>
        // ── DOM ──
        const voiceBtn = document.getElementById('voiceBtn');
        const statusEl = document.getElementById('status');
        const chatArea = document.getElementById('chatArea');
        const emptyState = document.getElementById('emptyState');
        const errorToast = document.getElementById('errorToast');
        const clearBtn = document.getElementById('clearBtn');
        const continuousModeToggle = document.getElementById('continuousMode');
        const connectionDot = document.getElementById('connectionDot');
        const waveformEl = document.getElementById('waveform');

        // ── State ──
        let ws = null;
        let audioContext = null;
        let audioSource = null;
        let audioProcessor = null;
        let mediaStream = null;
        let isRecording = false;
        let continuousMode = false;
        let silenceThreshold = 2000;
        let speechDetectedInSession = false;
        let recordingStartTime = null;
        const MIN_RECORDING_DURATION = 600;
        const MIN_TRANSCRIPT_LENGTH = 2;
        const NUM_WAVEFORM_BARS = 40;

        // UI state: 'idle' | 'listening' | 'processing' | 'speaking'
        let uiState = 'idle';

        // ── Init Waveform Bars ──
        for (let i = 0; i < NUM_WAVEFORM_BARS; i++) {
            const bar = document.createElement('div');
            bar.className = 'waveform-bar';
            waveformEl.appendChild(bar);
        }
        const waveformBars = waveformEl.querySelectorAll('.waveform-bar');

        // ── UI State Machine ──
        function setUIState(state, detail = '') {
            uiState = state;
            voiceBtn.className = 'voice-button' + (state !== 'idle' ? ` ${state}` : '');

            const icons = { idle: '🎙️', listening: '🎙️', processing: '⏳', speaking: '🔊' };
            voiceBtn.textContent = icons[state] || '🎙️';

            statusEl.className = 'status-text' + (state !== 'idle' ? ` ${state}` : '');

            const labels = {
                idle: continuousMode ? 'Tap to start' : 'Hold to talk',
                listening: continuousMode ? 'Listening…' : 'Listening…',
                processing: 'Thinking…',
                speaking: 'Speaking…',
            };
            statusEl.innerHTML = (detail || labels[state]) +
                (state === 'processing' ? ' <span class="thinking-dots visible"><span></span><span></span><span></span></span>' : '');

            waveformEl.classList.toggle('active', state === 'listening' || state === 'speaking');
            waveformEl.classList.toggle('speaking', state === 'speaking');

            // Reset waveform when not listening
            if (state !== 'listening') {
                waveformBars.forEach(b => b.style.height = '4px');
            }
        }

        // ── Waveform Update ──
        function updateWaveform(audioData) {
            if (uiState !== 'listening') return;
            const step = Math.floor(audioData.length / NUM_WAVEFORM_BARS);
            for (let i = 0; i < NUM_WAVEFORM_BARS; i++) {
                let sum = 0;
                for (let j = 0; j < step; j++) {
                    sum += Math.abs(audioData[i * step + j]);
                }
                const avg = sum / step;
                const height = Math.max(4, Math.min(44, avg * 800));
                waveformBars[i].style.height = height + 'px';
            }
        }

        // Animate waveform for TTS playback
        function animateSpeakingWaveform() {
            if (uiState !== 'speaking') return;
            waveformBars.forEach((bar, i) => {
                const h = 4 + Math.random() * 20 + Math.sin(Date.now() / 200 + i * 0.5) * 10;
                bar.style.height = Math.max(4, h) + 'px';
            });
            if (uiState === 'speaking') requestAnimationFrame(animateSpeakingWaveform);
        }

        // ── API Key ──
        function getApiKey() {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get('api_key') || localStorage.getItem('openclaw_api_key') || '';
        }

        // ── WebSocket ──
        function connect() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const apiKey = getApiKey();
            const basePath = window.location.pathname.replace(/\/$/, '');
            const wsPath = basePath ? `${basePath}/ws` : '/ws';
            const wsUrl = apiKey
                ? `${protocol}//${window.location.host}${wsPath}?api_key=${apiKey}`
                : `${protocol}//${window.location.host}${wsPath}`;

            ws = new WebSocket(wsUrl);

            ws.onopen = () => {
                connectionDot.className = 'connection-dot connected';
                setUIState('idle');
            };

            ws.onclose = (event) => {
                connectionDot.className = 'connection-dot error';
                if (event.code === 4001) showError('API key required');
                else if (event.code === 4002) showError('Invalid API key');
                else if (event.code === 4003) showError('Rate limited');
                else setTimeout(connect, 2000);
            };

            ws.onerror = () => showError('Connection error — is the server running?');
            ws.onmessage = (event) => handleMessage(JSON.parse(event.data));
        }

        // ── Audio Queue ──
        let audioQueue = [];
        let isPlayingQueue = false;
        let currentResponseElement = null;
        let streamingText = '';
        let playbackCtx = null;
        let nextStartTime = 0;

        function handleMessage(msg) {
            switch (msg.type) {
                case 'listening_started':
                    setUIState('listening');
                    break;

                case 'listening_stopped':
                    setUIState('processing');
                    break;

                case 'transcript':
                    if (!msg.text || msg.text.trim().length < MIN_TRANSCRIPT_LENGTH) {
                        if (continuousMode) {
                            setUIState('listening');
                            setTimeout(() => { if (continuousMode) startRecording(); }, 300);
                        } else {
                            setUIState('idle');
                        }
                        break;
                    }
                    hideEmptyState();
                    addMessage('user', msg.text);
                    setUIState('processing');
                    streamingText = '';
                    currentResponseElement = null;
                    audioQueue = [];
                    break;

                case 'response_chunk':
                    streamingText += msg.text;
                    updateStreamingMessage(streamingText);
                    if (uiState !== 'speaking') {
                        setUIState('speaking');
                        animateSpeakingWaveform();
                    }
                    break;

                case 'audio_chunk':
                    queueAudioChunk(msg.data);
                    break;

                case 'response_complete':
                    if (currentResponseElement) {
                        currentResponseElement.querySelector('.message-bubble').innerHTML = renderMarkdown(msg.text);
                    }
                    // Safety net for continuous mode
                    if (continuousMode && !isRecording) {
                        setTimeout(() => {
                            if (continuousMode && !isRecording && !isPlayingQueue) {
                                onAudioComplete();
                            }
                        }, 2000);
                    }
                    break;

                case 'vad_status':
                    if (msg.speech_detected) {
                        speechDetectedInSession = true;
                    }
                    break;

                case 'audio_response':
                    playAudioWithCallback(msg.data, msg.sample_rate, onAudioComplete);
                    setUIState('speaking');
                    animateSpeakingWaveform();
                    break;

                case 'pong':
                    break;
            }
        }

        // ── Chat Messages ──
        function hideEmptyState() {
            if (emptyState) emptyState.style.display = 'none';
        }

        function addMessage(role, text) {
            const wrapper = document.createElement('div');
            wrapper.className = `message ${role}`;

            const avatar = document.createElement('div');
            avatar.className = 'message-avatar';
            avatar.textContent = role === 'user' ? '🎤' : '🦞';

            const bubble = document.createElement('div');
            bubble.className = 'message-bubble';
            bubble.innerHTML = role === 'assistant' ? renderMarkdown(text) : escapeHtml(text);

            wrapper.appendChild(avatar);
            wrapper.appendChild(bubble);
            chatArea.appendChild(wrapper);
            chatArea.scrollTop = chatArea.scrollHeight;
            return wrapper;
        }

        function updateStreamingMessage(text) {
            if (!currentResponseElement) {
                hideEmptyState();
                currentResponseElement = addMessage('assistant', text);
            } else {
                currentResponseElement.querySelector('.message-bubble').innerHTML = renderMarkdown(text);
                chatArea.scrollTop = chatArea.scrollHeight;
            }
        }

        // ── Audio Playback ──
        function queueAudioChunk(base64Data) {
            audioQueue.push({ data: base64Data });
            if (!isPlayingQueue) playNextInQueue();
        }

        async function playNextInQueue() {
            if (audioQueue.length === 0) {
                isPlayingQueue = false;
                onAudioComplete();
                return;
            }
            isPlayingQueue = true;
            const { data } = audioQueue.shift();
            try {
                const binaryString = atob(data);
                const bytes = new Uint8Array(binaryString.length);
                for (let i = 0; i < binaryString.length; i++) {
                    bytes[i] = binaryString.charCodeAt(i);
                }
                if (!playbackCtx || playbackCtx.state === 'closed') {
                    playbackCtx = new (window.AudioContext || window.webkitAudioContext)();
                    nextStartTime = 0;
                }
                const audioBuffer = await playbackCtx.decodeAudioData(bytes.buffer);
                const source = playbackCtx.createBufferSource();
                source.buffer = audioBuffer;
                source.connect(playbackCtx.destination);
                const startAt = Math.max(nextStartTime, playbackCtx.currentTime);
                nextStartTime = startAt + audioBuffer.duration;
                source.onended = () => {
                    if (audioQueue.length === 0) {
                        playbackCtx.close();
                        playbackCtx = null;
                    }
                    playNextInQueue();
                };
                source.start(startAt);
            } catch (e) {
                console.error('Audio playback error:', e);
                playNextInQueue();
            }
        }

        function onAudioComplete() {
            if (continuousMode) {
                setUIState('listening');
                setTimeout(() => {
                    if (continuousMode) startRecording();
                }, 800);
            } else {
                setUIState('idle');
            }
        }

        function playAudioWithCallback(base64Data, sampleRate, callback) {
            const audioCtx = new AudioContext({ sampleRate: sampleRate });
            const audioData = base64ToFloat32(base64Data);
            const buffer = audioCtx.createBuffer(1, audioData.length, sampleRate);
            buffer.getChannelData(0).set(audioData);
            const source = audioCtx.createBufferSource();
            source.buffer = buffer;
            source.connect(audioCtx.destination);
            if (callback) source.onended = callback;
            source.start();
        }

        // ── Recording ──
        async function startRecording() {
            if (isRecording) return;

            try {
                if (!mediaStream) {
                    mediaStream = await navigator.mediaDevices.getUserMedia({
                        audio: {
                            sampleRate: 16000,
                            channelCount: 1,
                            echoCancellation: true,
                            noiseSuppression: true,
                        }
                    });
                }

                audioContext = new AudioContext({ sampleRate: 16000 });
                audioSource = audioContext.createMediaStreamSource(mediaStream);
                audioProcessor = audioContext.createScriptProcessor(4096, 1, 1);

                let lastSoundTime = Date.now();

                audioProcessor.onaudioprocess = (e) => {
                    if (isRecording && ws && ws.readyState === WebSocket.OPEN) {
                        const audioData = e.inputBuffer.getChannelData(0);
                        const base64 = float32ToBase64(audioData);
                        ws.send(JSON.stringify({ type: 'audio', data: base64 }));

                        // Update waveform visualization
                        updateWaveform(audioData);

                        // Continuous mode: silence detection
                        if (continuousMode) {
                            const energy = audioData.reduce((sum, val) => sum + Math.abs(val), 0) / audioData.length;
                            if (energy > 0.01) {
                                lastSoundTime = Date.now();
                            } else if (speechDetectedInSession && Date.now() - lastSoundTime > silenceThreshold) {
                                stopRecording();
                            }
                        }
                    }
                };

                audioSource.connect(audioProcessor);
                audioProcessor.connect(audioContext.destination);

                isRecording = true;
                speechDetectedInSession = false;
                recordingStartTime = Date.now();
                setUIState('listening');

                ws.send(JSON.stringify({ type: 'start_listening' }));

            } catch (err) {
                showError(`Microphone error: ${err.message}`);
            }
        }

        function stopRecording() {
            if (!isRecording) return;

            const recordingDuration = Date.now() - (recordingStartTime || Date.now());
            const tooShort = recordingDuration < MIN_RECORDING_DURATION;

            isRecording = false;

            if (audioProcessor) { audioProcessor.disconnect(); audioProcessor = null; }
            if (audioSource) { audioSource.disconnect(); audioSource = null; }
            if (audioContext) { audioContext.close(); audioContext = null; }

            if (!continuousMode && mediaStream) {
                mediaStream.getTracks().forEach(track => track.stop());
                mediaStream = null;
            }

            if (ws && ws.readyState === WebSocket.OPEN) {
                if (continuousMode && (tooShort || !speechDetectedInSession)) {
                    ws.send(JSON.stringify({ type: 'cancel_listening' }));
                    setUIState('listening');
                    setTimeout(() => { if (continuousMode) startRecording(); }, 300);
                    return;
                }
                ws.send(JSON.stringify({ type: 'stop_listening' }));
                setUIState('processing');
            }
        }

        // ── Utilities ──
        function float32ToBase64(float32Array) {
            const bytes = new Uint8Array(float32Array.buffer);
            let binary = '';
            for (let i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
            return btoa(binary);
        }

        function base64ToFloat32(base64) {
            const binary = atob(base64);
            const bytes = new Uint8Array(binary.length);
            for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
            return new Float32Array(bytes.buffer);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function renderMarkdown(text) {
            return text
                .replace(/```[\s\S]*?```/g, '<code class="block">code</code>')
                .replace(/`([^`]+)`/g, '<code>$1</code>')
                .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
                .replace(/\*([^*]+)\*/g, '<em>$1</em>')
                .replace(/^#{1,3}\s+(.+)$/gm, '<strong>$1</strong>')
                .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>')
                .replace(/\n/g, '<br>');
        }

        function showError(msg) {
            errorToast.textContent = msg;
            errorToast.classList.add('visible');
            setTimeout(() => errorToast.classList.remove('visible'), 5000);
        }

        // ── Event Listeners ──

        // Push-to-talk (non-continuous)
        voiceBtn.addEventListener('mousedown', () => { if (!continuousMode) startRecording(); });
        voiceBtn.addEventListener('mouseup', () => { if (!continuousMode) stopRecording(); });
        voiceBtn.addEventListener('mouseleave', () => { if (!continuousMode && isRecording) stopRecording(); });
        voiceBtn.addEventListener('touchstart', (e) => { e.preventDefault(); if (!continuousMode) startRecording(); });
        voiceBtn.addEventListener('touchend', () => { if (!continuousMode) stopRecording(); });

        // Tap toggle (continuous)
        voiceBtn.addEventListener('click', () => {
            if (continuousMode) {
                if (isRecording) stopRecording();
                else startRecording();
            }
        });

        // Spacebar
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && !e.repeat && e.target === document.body) {
                e.preventDefault();
                if (isRecording) stopRecording();
                else startRecording();
            }
        });

        // Clear
        clearBtn.addEventListener('click', () => {
            chatArea.innerHTML = '';
            emptyState.style.display = '';
            chatArea.appendChild(emptyState);
        });

        // Continuous mode toggle
        continuousModeToggle.addEventListener('change', (e) => {
            continuousMode = e.target.checked;
            setUIState('idle');

            if (continuousMode) {
                navigator.mediaDevices.getUserMedia({ audio: true })
                    .then(stream => { mediaStream = stream; })
                    .catch(err => showError(`Mic access needed: ${err.message}`));
            } else {
                if (mediaStream && !isRecording) {
                    mediaStream.getTracks().forEach(track => track.stop());
                    mediaStream = null;
                }
            }
        });

        // ── Init ──
        connect();
        setInterval(() => {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'ping' }));
            }
        }, 30000);
    </script>
</body>
</html>
