<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🦞 Voice Control</title>
    <style>
        :root {
            --bg: #09090b;
            --surface: #111114;
            --border: #1e1e24;
            --text: #e4e4e7;
            --text-dim: #71717a;
            --text-muted: #3f3f46;

            --blue: #3b82f6;
            --blue-dim: #1e3a5f;
            --blue-glow: rgba(59, 130, 246, 0.15);

            --amber: #f59e0b;
            --amber-dim: #422006;
            --amber-glow: rgba(245, 158, 11, 0.15);

            --green: #10b981;
            --green-dim: #064e3b;
            --green-glow: rgba(16, 185, 129, 0.12);

            --teal: #14b8a6;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* ─── Header ─── */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 16px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            z-index: 10;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .header-title {
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: -0.01em;
        }

        .status-pill {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.7rem;
            color: var(--text-dim);
            background: var(--bg);
            padding: 3px 8px 3px 6px;
            border-radius: 100px;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #444;
            transition: background 0.3s;
        }
        .status-dot.on { background: var(--green); box-shadow: 0 0 6px var(--green); }
        .status-dot.err { background: #ef4444; }

        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .toggle-group {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .toggle-label {
            font-size: 0.7rem;
            color: var(--text-dim);
            cursor: pointer;
            user-select: none;
        }

        .toggle {
            position: relative;
            width: 34px;
            height: 18px;
            cursor: pointer;
        }

        .toggle input { display: none; }

        .toggle-track {
            position: absolute;
            inset: 0;
            background: #27272a;
            border-radius: 18px;
            transition: background 0.2s;
        }

        .toggle-thumb {
            position: absolute;
            top: 2px;
            left: 2px;
            width: 14px;
            height: 14px;
            background: #52525b;
            border-radius: 50%;
            transition: all 0.2s;
        }

        .toggle input:checked ~ .toggle-track { background: var(--blue-dim); }
        .toggle input:checked ~ .toggle-thumb {
            left: 18px;
            background: var(--blue);
        }

        .icon-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 4px;
            border-radius: 4px;
            font-size: 0.75rem;
            transition: color 0.15s;
        }
        .icon-btn:hover { color: var(--text-dim); }

        /* ─── Chat ─── */
        .chat {
            flex: 1;
            overflow-y: auto;
            padding: 20px 16px 12px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            overscroll-behavior: contain;
        }

        .chat::-webkit-scrollbar { width: 3px; }
        .chat::-webkit-scrollbar-track { background: transparent; }
        .chat::-webkit-scrollbar-thumb { background: #27272a; border-radius: 3px; }

        /* Empty state */
        .empty {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: var(--text-muted);
        }
        .empty-icon { font-size: 2rem; opacity: 0.4; }
        .empty p { font-size: 0.8rem; }

        /* Messages */
        .msg {
            max-width: 75%;
            animation: msgIn 0.25s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes msgIn {
            from { opacity: 0; transform: translateY(6px) scale(0.98); }
            to { opacity: 1; transform: none; }
        }

        .msg-user { align-self: flex-end; }
        .msg-ai { align-self: flex-start; }

        .msg-bubble {
            padding: 10px 14px;
            border-radius: 18px;
            font-size: 0.88rem;
            line-height: 1.55;
            letter-spacing: -0.005em;
        }

        .msg-user .msg-bubble {
            background: var(--blue);
            color: #fff;
            border-bottom-right-radius: 6px;
        }

        .msg-ai .msg-bubble {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            border-bottom-left-radius: 6px;
        }

        .msg-bubble strong { color: #fff; font-weight: 600; }
        .msg-ai .msg-bubble strong { color: #e4e4e7; }
        .msg-bubble em { font-style: italic; opacity: 0.9; }
        .msg-bubble code {
            background: rgba(255,255,255,0.08);
            padding: 1px 5px;
            border-radius: 4px;
            font-family: 'SF Mono', Monaco, 'Cascadia Code', monospace;
            font-size: 0.82em;
        }
        .msg-bubble a { color: #93c5fd; text-decoration: none; }
        .msg-bubble a:hover { text-decoration: underline; }

        .msg-time {
            font-size: 0.6rem;
            color: var(--text-muted);
            margin-top: 3px;
            padding: 0 4px;
        }
        .msg-user .msg-time { text-align: right; }

        /* ─── Voice Bar ─── */
        .voice-bar {
            flex-shrink: 0;
            background: var(--surface);
            border-top: 1px solid var(--border);
            padding: 16px 16px 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
        }

        /* Canvas waveform */
        .waveform-wrap {
            width: 100%;
            max-width: 420px;
            height: 40px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .waveform-wrap.visible { opacity: 1; }

        #waveCanvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* Orb button */
        .orb-wrap {
            position: relative;
            width: 72px;
            height: 72px;
        }

        /* Pulse rings */
        .orb-ring {
            position: absolute;
            inset: -8px;
            border-radius: 50%;
            border: 1.5px solid transparent;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .orb-ring-outer {
            inset: -16px;
        }

        .orb-btn {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            border: 2px solid #27272a;
            background: var(--bg);
            color: var(--text-muted);
            font-size: 1.5rem;
            cursor: pointer;
            position: relative;
            z-index: 2;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            -webkit-tap-highlight-color: transparent;
        }

        .orb-btn:hover {
            border-color: #3f3f46;
            color: var(--text-dim);
            transform: scale(1.03);
        }

        .orb-btn:active { transform: scale(0.96); }

        /* ── State: Listening ── */
        .state-listening .orb-btn {
            border-color: var(--blue);
            background: var(--blue-dim);
            color: var(--blue);
            box-shadow: 0 0 24px var(--blue-glow), 0 0 60px rgba(59, 130, 246, 0.06);
        }
        .state-listening .orb-ring {
            border-color: rgba(59, 130, 246, 0.2);
            animation: ringPulse 2s ease-in-out infinite;
        }
        .state-listening .orb-ring-outer {
            border-color: rgba(59, 130, 246, 0.08);
            animation: ringPulse 2s ease-in-out infinite 0.5s;
        }

        /* ── State: Processing ── */
        .state-processing .orb-btn {
            border-color: var(--amber);
            background: var(--amber-dim);
            color: var(--amber);
            box-shadow: 0 0 24px var(--amber-glow);
        }
        .state-processing .orb-ring {
            border-color: rgba(245, 158, 11, 0.25);
            animation: ringSpin 3s linear infinite;
            border-top-color: transparent;
            border-left-color: transparent;
        }
        .state-processing .orb-ring-outer {
            border-color: rgba(245, 158, 11, 0.1);
            animation: ringSpin 4s linear infinite reverse;
            border-bottom-color: transparent;
            border-right-color: transparent;
        }

        /* ── State: Speaking ── */
        .state-speaking .orb-btn {
            border-color: var(--green);
            background: var(--green-dim);
            color: var(--green);
            box-shadow: 0 0 24px var(--green-glow), 0 0 60px rgba(16, 185, 129, 0.06);
        }
        .state-speaking .orb-ring {
            border-color: rgba(16, 185, 129, 0.2);
            animation: ringBreath 1.5s ease-in-out infinite;
        }
        .state-speaking .orb-ring-outer {
            border-color: rgba(16, 185, 129, 0.08);
            animation: ringBreath 1.5s ease-in-out infinite 0.3s;
        }

        @keyframes ringPulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.12); opacity: 0.5; }
        }

        @keyframes ringSpin {
            to { transform: rotate(360deg); }
        }

        @keyframes ringBreath {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.06); opacity: 0.4; }
        }

        /* Status label */
        .state-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-align: center;
            transition: color 0.3s;
            min-height: 18px;
        }

        .state-listening .state-label { color: var(--blue); }
        .state-processing .state-label { color: var(--amber); }
        .state-speaking .state-label { color: var(--green); }

        /* Thinking animation inline */
        .dots::after {
            content: '';
            animation: dots 1.5s steps(4, end) infinite;
        }
        @keyframes dots {
            0% { content: ''; }
            25% { content: '.'; }
            50% { content: '..'; }
            75% { content: '...'; }
        }

        /* Keyboard hint */
        .kb-hint {
            font-size: 0.65rem;
            color: var(--text-muted);
            opacity: 0.6;
        }
        .kb-hint kbd {
            background: #18181b;
            border: 1px solid #27272a;
            border-radius: 3px;
            padding: 0 4px;
            font-family: inherit;
            font-size: inherit;
        }

        /* Footer */
        .footer {
            flex-shrink: 0;
            text-align: center;
            padding: 6px;
            font-size: 0.6rem;
            color: #27272a;
        }
        .footer a { color: #3f3f46; text-decoration: none; }

        /* Error */
        .toast {
            position: fixed;
            bottom: 140px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: #450a0a;
            color: #fca5a5;
            border: 1px solid #7f1d1d;
            padding: 8px 16px;
            border-radius: 10px;
            font-size: 0.78rem;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 50;
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* Mobile */
        @media (max-width: 600px) {
            .msg { max-width: 88%; }
            .orb-btn { width: 80px; height: 80px; font-size: 1.7rem; }
            .orb-wrap { width: 80px; height: 80px; }
            .chat { padding: 16px 12px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <span class="header-title">🦞 Voice Control</span>
            <div class="status-pill">
                <span class="status-dot" id="dot"></span>
                <span id="connLabel">Connecting</span>
            </div>
        </div>
        <div class="header-right">
            <div class="toggle-group">
                <label class="toggle" id="contToggle">
                    <input type="checkbox" id="continuousMode">
                    <div class="toggle-track"></div>
                    <div class="toggle-thumb"></div>
                </label>
                <label class="toggle-label" for="continuousMode">Continuous</label>
            </div>
            <button class="icon-btn" id="clearBtn" title="Clear chat">✕</button>
        </div>
    </div>

    <div class="chat" id="chat">
        <div class="empty" id="empty">
            <div class="empty-icon">🎙️</div>
            <p>Hold mic or enable continuous mode</p>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <div class="voice-bar" id="voiceBar">
        <div class="waveform-wrap" id="waveWrap">
            <canvas id="waveCanvas"></canvas>
        </div>

        <div class="orb-wrap" id="orbWrap">
            <div class="orb-ring orb-ring-outer"></div>
            <div class="orb-ring"></div>
            <button class="orb-btn" id="orbBtn">🎙️</button>
        </div>

        <div class="state-label" id="stateLabel">Hold to talk</div>
        <div class="kb-hint"><kbd>Space</kbd> to talk</div>
    </div>

    <div class="footer">
        Made with 🦞 by <a href="https://github.com/OpenCnid">Cnid</a> ·
        <a href="https://github.com/OpenCnid/openclaw-voice-control">GitHub</a>
    </div>

    <script>
    (() => {
        // ── DOM ──
        const $ = id => document.getElementById(id);
        const chat    = $('chat');
        const empty   = $('empty');
        const toast   = $('toast');
        const dot     = $('dot');
        const connLbl = $('connLabel');
        const orbBtn  = $('orbBtn');
        const voiceBar = $('voiceBar');
        const waveWrap = $('waveWrap');
        const canvas   = $('waveCanvas');
        const ctx      = canvas.getContext('2d');
        const stateLbl = $('stateLabel');

        // ── State ──
        let ws = null;
        let audioCtx = null, audioSrc = null, audioProc = null, mic = null;
        let recording = false, continuous = false;
        let speechDetected = false, recStart = 0;
        let uiState = 'idle'; // idle | listening | processing | speaking
        const SILENCE_MS = 2000, MIN_DUR = 600, MIN_LEN = 2;

        // Streaming
        let audioQ = [], playing = false, curMsgEl = null, streamTxt = '';
        let playCtx = null, nextTime = 0;

        // Waveform data
        let waveData = new Float32Array(128);
        let waveAnim = null;

        // ── Canvas setup ──
        function sizeCanvas() {
            const r = canvas.parentElement.getBoundingClientRect();
            canvas.width = r.width * devicePixelRatio;
            canvas.height = r.height * devicePixelRatio;
            ctx.scale(devicePixelRatio, devicePixelRatio);
        }
        sizeCanvas();
        window.addEventListener('resize', sizeCanvas);

        // ── Draw waveform ──
        function drawWave(data, color) {
            const w = canvas.width / devicePixelRatio;
            const h = canvas.height / devicePixelRatio;
            ctx.clearRect(0, 0, w, h);

            const bars = 48;
            const gap = 2.5;
            const barW = (w - (bars - 1) * gap) / bars;
            const step = Math.floor(data.length / bars);
            const radius = 1.5;

            for (let i = 0; i < bars; i++) {
                let sum = 0;
                for (let j = 0; j < step; j++) sum += Math.abs(data[i * step + j] || 0);
                const avg = sum / step;
                const barH = Math.max(3, Math.min(h - 4, avg * 600));
                const x = i * (barW + gap);
                const y = (h - barH) / 2;

                ctx.fillStyle = color;
                // Rounded rect
                ctx.beginPath();
                ctx.moveTo(x + radius, y);
                ctx.lineTo(x + barW - radius, y);
                ctx.quadraticCurveTo(x + barW, y, x + barW, y + radius);
                ctx.lineTo(x + barW, y + barH - radius);
                ctx.quadraticCurveTo(x + barW, y + barH, x + barW - radius, y + barH);
                ctx.lineTo(x + radius, y + barH);
                ctx.quadraticCurveTo(x, y + barH, x, y + barH - radius);
                ctx.lineTo(x, y + radius);
                ctx.quadraticCurveTo(x, y, x + radius, y);
                ctx.fill();
            }
        }

        function drawSpeakingWave() {
            if (uiState !== 'speaking') return;
            const n = 128;
            const d = new Float32Array(n);
            const t = performance.now() / 1000;
            for (let i = 0; i < n; i++) {
                d[i] = 0.02 + 0.03 * Math.sin(t * 3 + i * 0.15)
                      + 0.015 * Math.sin(t * 5.7 + i * 0.3)
                      + 0.01 * Math.random();
            }
            drawWave(d, 'rgba(16, 185, 129, 0.7)');
            waveAnim = requestAnimationFrame(drawSpeakingWave);
        }

        function drawProcessingWave() {
            if (uiState !== 'processing') return;
            const n = 128;
            const d = new Float32Array(n);
            const t = performance.now() / 1000;
            for (let i = 0; i < n; i++) {
                d[i] = 0.008 + 0.012 * Math.sin(t * 2 + i * 0.2);
            }
            drawWave(d, 'rgba(245, 158, 11, 0.5)');
            waveAnim = requestAnimationFrame(drawProcessingWave);
        }

        // ── UI State Machine ──
        function setState(state, label) {
            uiState = state;
            voiceBar.className = 'voice-bar' + (state !== 'idle' ? ` state-${state}` : '');

            const icons = { idle: '🎙️', listening: '🎙️', processing: '⏳', speaking: '🔊' };
            orbBtn.textContent = icons[state];

            const labels = {
                idle: continuous ? 'Tap to start' : 'Hold to talk',
                listening: 'Listening…',
                processing: 'Thinking',
                speaking: 'Speaking…',
            };
            const txt = label || labels[state];
            stateLbl.innerHTML = state === 'processing'
                ? `<span class="dots">${txt}</span>`
                : txt;

            waveWrap.classList.toggle('visible', state !== 'idle');

            if (waveAnim) { cancelAnimationFrame(waveAnim); waveAnim = null; }

            if (state === 'speaking') drawSpeakingWave();
            else if (state === 'processing') drawProcessingWave();
            else if (state === 'idle') {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
            }
        }

        // ── Helpers ──
        function now() { const d = new Date(); return d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}); }

        function hideEmpty() { if (empty) empty.style.display = 'none'; }

        function addMsg(role, text) {
            hideEmpty();
            const el = document.createElement('div');
            el.className = `msg msg-${role === 'user' ? 'user' : 'ai'}`;
            el.innerHTML = `
                <div class="msg-bubble">${role === 'user' ? esc(text) : md(text)}</div>
                <div class="msg-time">${now()}</div>`;
            chat.appendChild(el);
            chat.scrollTop = chat.scrollHeight;
            return el;
        }

        function updateStream(text) {
            if (!curMsgEl) curMsgEl = addMsg('ai', text);
            else {
                curMsgEl.querySelector('.msg-bubble').innerHTML = md(text);
                chat.scrollTop = chat.scrollHeight;
            }
        }

        function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

        function md(s) {
            return s
                .replace(/```[\s\S]*?```/g, m => `<code>${esc(m.slice(3,-3))}</code>`)
                .replace(/`([^`]+)`/g, '<code>$1</code>')
                .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
                .replace(/\*([^*]+)\*/g, '<em>$1</em>')
                .replace(/^#{1,3}\s+(.+)$/gm, '<strong>$1</strong>')
                .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>')
                .replace(/\n/g, '<br>');
        }

        function showToast(msg) {
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 4000);
        }

        // ── WebSocket ──
        function connect() {
            const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
            const key = new URLSearchParams(location.search).get('api_key') || localStorage.getItem('openclaw_api_key') || '';
            const base = location.pathname.replace(/\/$/, '');
            const path = base ? `${base}/ws` : '/ws';
            const url = key ? `${proto}//${location.host}${path}?api_key=${key}` : `${proto}//${location.host}${path}`;

            ws = new WebSocket(url);
            ws.onopen = () => { dot.className = 'status-dot on'; connLbl.textContent = 'Connected'; setState('idle'); };
            ws.onclose = e => {
                dot.className = 'status-dot err'; connLbl.textContent = 'Offline';
                if (e.code >= 4001 && e.code <= 4003) showToast(['','API key required','Invalid key','Rate limited'][e.code-4000]);
                else setTimeout(connect, 2000);
            };
            ws.onerror = () => showToast('Connection error');
            ws.onmessage = e => handle(JSON.parse(e.data));
        }

        function handle(m) {
            switch (m.type) {
                case 'listening_started':
                    setState('listening');
                    break;

                case 'listening_stopped':
                    setState('processing');
                    break;

                case 'transcript':
                    if (!m.text || m.text.trim().length < MIN_LEN) {
                        if (continuous) { setState('listening'); setTimeout(() => continuous && startRec(), 300); }
                        else setState('idle');
                        break;
                    }
                    addMsg('user', m.text);
                    setState('processing');
                    streamTxt = ''; curMsgEl = null; audioQ = [];
                    break;

                case 'response_chunk':
                    streamTxt += m.text;
                    updateStream(streamTxt);
                    if (uiState !== 'speaking') setState('speaking');
                    break;

                case 'audio_chunk':
                    queueAudio(m.data);
                    break;

                case 'response_complete':
                    if (curMsgEl) curMsgEl.querySelector('.msg-bubble').innerHTML = md(m.text);
                    if (continuous && !recording)
                        setTimeout(() => { if (continuous && !recording && !playing) audioDone(); }, 2000);
                    break;

                case 'vad_status':
                    if (m.speech_detected) speechDetected = true;
                    break;

                case 'audio_response':
                    playLegacy(m.data, m.sample_rate, audioDone);
                    setState('speaking');
                    break;

                case 'pong': break;
            }
        }

        // ── Audio queue ──
        function queueAudio(b64) { audioQ.push(b64); if (!playing) playNext(); }

        async function playNext() {
            if (!audioQ.length) { playing = false; audioDone(); return; }
            playing = true;
            const data = audioQ.shift();
            try {
                const bin = atob(data);
                const bytes = new Uint8Array(bin.length);
                for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
                if (!playCtx || playCtx.state === 'closed')
                    { playCtx = new (window.AudioContext || window.webkitAudioContext)(); nextTime = 0; }
                const buf = await playCtx.decodeAudioData(bytes.buffer);
                const src = playCtx.createBufferSource();
                src.buffer = buf; src.connect(playCtx.destination);
                const at = Math.max(nextTime, playCtx.currentTime);
                nextTime = at + buf.duration;
                src.onended = () => { if (!audioQ.length) { playCtx.close(); playCtx = null; } playNext(); };
                src.start(at);
            } catch(e) { console.error('audio err', e); playNext(); }
        }

        function audioDone() {
            if (continuous) {
                setState('listening');
                setTimeout(() => continuous && startRec(), 800);
            } else setState('idle');
        }

        function playLegacy(b64, sr, cb) {
            const ac = new AudioContext({ sampleRate: sr });
            const bin = atob(b64);
            const bytes = new Uint8Array(bin.length);
            for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
            const f32 = new Float32Array(bytes.buffer);
            const buf = ac.createBuffer(1, f32.length, sr);
            buf.getChannelData(0).set(f32);
            const src = ac.createBufferSource();
            src.buffer = buf; src.connect(ac.destination);
            if (cb) src.onended = cb;
            src.start();
        }

        // ── Recording ──
        async function startRec() {
            if (recording) return;
            try {
                if (!mic) mic = await navigator.mediaDevices.getUserMedia({
                    audio: { sampleRate: 16000, channelCount: 1, echoCancellation: true, noiseSuppression: true }
                });

                audioCtx = new AudioContext({ sampleRate: 16000 });
                audioSrc = audioCtx.createMediaStreamSource(mic);
                audioProc = audioCtx.createScriptProcessor(4096, 1, 1);

                let lastSound = Date.now();

                audioProc.onaudioprocess = e => {
                    if (!recording || !ws || ws.readyState !== 1) return;
                    const d = e.inputBuffer.getChannelData(0);
                    // Send audio
                    const b = new Uint8Array(d.buffer.slice(0));
                    let s = ''; for (let i = 0; i < b.length; i++) s += String.fromCharCode(b[i]);
                    ws.send(JSON.stringify({ type: 'audio', data: btoa(s) }));

                    // Waveform
                    waveData = new Float32Array(d);
                    drawWave(waveData, 'rgba(59, 130, 246, 0.7)');

                    // Silence detect
                    if (continuous) {
                        let e2 = 0; for (let i = 0; i < d.length; i++) e2 += Math.abs(d[i]);
                        e2 /= d.length;
                        if (e2 > 0.01) lastSound = Date.now();
                        else if (speechDetected && Date.now() - lastSound > SILENCE_MS) stopRec();
                    }
                };

                audioSrc.connect(audioProc);
                audioProc.connect(audioCtx.destination);

                recording = true; speechDetected = false; recStart = Date.now();
                setState('listening');
                ws.send(JSON.stringify({ type: 'start_listening' }));
            } catch(err) { showToast('Mic error: ' + err.message); }
        }

        function stopRec() {
            if (!recording) return;
            const dur = Date.now() - recStart;
            const short = dur < MIN_DUR;
            recording = false;

            if (audioProc) { audioProc.disconnect(); audioProc = null; }
            if (audioSrc) { audioSrc.disconnect(); audioSrc = null; }
            if (audioCtx) { audioCtx.close(); audioCtx = null; }
            if (!continuous && mic) { mic.getTracks().forEach(t => t.stop()); mic = null; }

            if (ws && ws.readyState === 1) {
                if (continuous && (short || !speechDetected)) {
                    ws.send(JSON.stringify({ type: 'cancel_listening' }));
                    setState('listening');
                    setTimeout(() => continuous && startRec(), 300);
                    return;
                }
                ws.send(JSON.stringify({ type: 'stop_listening' }));
                setState('processing');
            }
        }

        // ── Events ──
        orbBtn.addEventListener('mousedown', () => { if (!continuous) startRec(); });
        orbBtn.addEventListener('mouseup', () => { if (!continuous) stopRec(); });
        orbBtn.addEventListener('mouseleave', () => { if (!continuous && recording) stopRec(); });
        orbBtn.addEventListener('touchstart', e => { e.preventDefault(); if (!continuous) startRec(); });
        orbBtn.addEventListener('touchend', () => { if (!continuous) stopRec(); });
        orbBtn.addEventListener('click', () => { if (continuous) { recording ? stopRec() : startRec(); } });

        document.addEventListener('keydown', e => {
            if (e.code === 'Space' && !e.repeat && e.target === document.body) {
                e.preventDefault();
                recording ? stopRec() : startRec();
            }
        });

        $('clearBtn').addEventListener('click', () => {
            chat.innerHTML = '';
            empty.style.display = '';
            chat.appendChild(empty);
        });

        $('continuousMode').addEventListener('change', e => {
            continuous = e.target.checked;
            setState('idle');
            if (continuous)
                navigator.mediaDevices.getUserMedia({ audio: true }).then(s => mic = s).catch(e => showToast('Mic: ' + e.message));
            else if (mic && !recording) { mic.getTracks().forEach(t => t.stop()); mic = null; }
        });

        // ── Init ──
        connect();
        setInterval(() => { if (ws && ws.readyState === 1) ws.send(JSON.stringify({ type: 'ping' })); }, 30000);
    })();
    </script>
</body>
</html>
